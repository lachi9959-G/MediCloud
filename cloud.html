<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediCloud| Patient Health Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* HealthAssist Pro Clinical Palette */
            --bg-color: #f8fafc;
            --primary-text: #0f172a;
            --secondary-text: #475569;
            --accent-color: #0d9488; /* Medical Teal */
            --accent-hover: #0f766e;
            --panel-bg: #ffffff;
            --panel-border: #e2e8f0;
            --danger-color: #be123c;
            --success-color: #10b981;
            --shadow-clinical: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Poppins', sans-serif;
            color: var(--primary-text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- LOGIN PAGE --- */
        #login-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: var(--panel-bg); padding: 40px; border-radius: 30px;
            border: 1px solid var(--panel-border); text-align: center;
            width: 90%; max-width: 400px; box-shadow: var(--shadow-clinical);
        }
        .login-card h2 { font-family: 'Dancing Script', cursive; font-size: 3.5em; color: var(--accent-color); margin-bottom: 10px; font-weight: 800; }
        .login-card p { font-weight: 600; color: var(--secondary-text); margin-bottom: 25px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
        
        /* New Role Switcher */
        .role-switcher {
            display: flex;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .role-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8em;
            text-transform: uppercase;
            transition: 0.3s;
            color: var(--secondary-text);
            background: transparent;
        }
        .role-btn.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .login-input {
            width: 100%; padding: 14px; margin: 12px 0; border-radius: 12px;
            border: 1px solid var(--panel-border); background: #f1f5f9; color: var(--primary-text);
            box-sizing: border-box; font-family: inherit; outline: none; transition: 0.3s;
        }
        .login-input:focus { border-color: var(--accent-color); background: white; box-shadow: 0 0 0 4px #ccfbf1; }

        .login-btn {
            width: 100%; padding: 14px; margin-top: 15px; border-radius: 12px; border: none;
            background: var(--accent-color); color: #fff; font-weight: 700; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .login-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }

        /* --- MAIN APP LAYOUT --- */
        #main-app { display: none; padding-top: 80px; padding-bottom: 100px; }
        
        #top-bar {
            position: fixed; top: 0; width: 100%; height: 75px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; box-sizing: border-box; z-index: 100;
            border-bottom: 1px solid var(--panel-border);
        }

        .user-info { display: flex; align-items: center; gap: 12px; color: var(--accent-color); font-weight: 700; }
        .role-badge { font-size: 0.6em; background: #e2e8f0; padding: 2px 8px; border-radius: 5px; text-transform: uppercase; }
        .logout-btn { background: var(--danger-color); border: none; color: white; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.8em; }

        #diary-container { width: 100%; max-width: 700px; margin: 0 auto; padding: 20px; }
        h1 { font-family: 'Dancing Script', cursive; text-align: center; font-size: 3.5em; margin-bottom: 30px; color: var(--primary-text); }

        /* --- POSTS / HEALTH RECORDS --- */
        .post {
            background: var(--panel-bg); border: 1px solid var(--panel-border);
            padding: 25px; margin-bottom: 25px; border-radius: 20px;
            position: relative; transition: transform 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .post-date { font-size: 0.75em; color: var(--secondary-text); margin-bottom: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .patient-label { font-size: 0.7em; color: var(--accent-color); font-weight: 800; margin-bottom: 5px; display: block; }
        .post-content { line-height: 1.6; margin-bottom: 15px; font-weight: 500; color: var(--secondary-text); }
        
        .media-container img {
            width: 100%; border-radius: 15px; border: 1px solid var(--panel-border); margin-bottom: 15px;
        }
        .pdf-link {
            display: flex; align-items: center; background: #f0fdfa;
            padding: 15px; border-radius: 15px; text-decoration: none; color: var(--accent-color);
            border: 1px solid #ccfbf1; margin-bottom: 15px; transition: 0.3s;
        }
        .pdf-link:hover { border-color: var(--accent-color); }
        .pdf-link i { font-size: 2.2em; margin-right: 15px; color: var(--danger-color); }
        .pdf-link div strong { font-weight: 800; color: var(--primary-text); }

        .delete-btn { color: #cbd5e1; background: none; border: none; cursor: pointer; float: right; transition: 0.3s; font-size: 1.1em; }
        .delete-btn:hover { color: var(--danger-color); }

        /* --- MODAL --- */
        #post-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 35px; border-radius: 25px; width: 90%; max-width: 500px;
            border: 1px solid var(--panel-border); box-shadow: var(--shadow-clinical);
        }
        .modal-content h3 { font-weight: 800; margin-top: 0; color: var(--accent-color); }
        
        .upload-area {
            border: 2px dashed #cbd5e1; padding: 30px; text-align: center;
            margin: 15px 0; border-radius: 15px; cursor: pointer; transition: 0.3s;
            background: #f8fafc;
        }
        .upload-area:hover { border-color: var(--accent-color); background: #f0fdfa; }
        .upload-area i { color: var(--accent-color); margin-bottom: 10px; }
        .upload-area p { font-size: 0.85em; font-weight: 600; color: var(--secondary-text); }
        
        .progress-bar { height: 6px; background: var(--accent-color); width: 0%; margin-top: 10px; border-radius: 10px; display: none; transition: width 0.3s; }

        /* --- FOOTER NAVBAR --- */
        #bottom-bar {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: rgba(255, 255, 255, 0.95); display: flex; justify-content: center; align-items: center;
            border-top: 1px solid var(--panel-border); backdrop-filter: blur(10px);
        }
        .nav-btn {
            background: var(--accent-color); border: none;
            color: white; padding: 12px 28px; border-radius: 15px; margin: 0 10px;
            cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 700;
            text-transform: uppercase; font-size: 0.85rem; transition: 0.3s;
            box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.2);
        }
        .nav-btn:hover { background: var(--accent-hover); transform: translateY(-3px); }
        .nav-btn i { font-size: 1.1em; }
    </style>
</head>
<body>

<!-- Login Section -->
<div id="login-container">
    <div class="login-card">
        <h2>MediCloud</h2>
        <p>Health Management Portal</p>
        
        <div class="role-switcher">
            <button id="btn-role-patient" class="role-btn active" onclick="app.setLoginRole('patient')">Patient</button>
            <button id="btn-role-staff" class="role-btn" onclick="app.setLoginRole('staff')">Staff</button>
        </div>

        <input type="text" id="login-user" class="login-input" placeholder="Username / Name">
        <input type="password" id="login-pass" class="login-input" placeholder="Password">
        <button class="login-btn" onclick="app.login()">Secure Login</button>
    </div>
</div>

<!-- Main Application Section -->
<div id="main-app">
    <div id="top-bar">
        <div class="user-info">
            <i class="fas fa-user-circle fa-2x"></i>
            <div>
                <span id="current-patient-name">User</span><br>
                <span id="current-role-badge" class="role-badge">Role</span>
            </div>
        </div>
        <button class="logout-btn" onclick="app.logout()">Sign Out</button>
    </div>

    <div id="diary-container">
        <h1 id="view-title">Clinical History</h1>
        <div id="records-list"></div>
    </div>

    <div id="bottom-bar">
        <button class="nav-btn" onclick="app.openModal('note')">
            <i class="fas fa-pen-nib"></i> Daily Note
        </button>
        <button class="nav-btn" onclick="app.openModal('report')" style="background: var(--primary-text);">
            <i class="fas fa-file-medical"></i> Add Report
        </button>
    </div>
</div>

<!-- Upload Modal -->
<div id="post-modal-overlay">
    <div class="modal-content">
        <h3 id="modal-title">New Entry</h3>
        <textarea id="post-text" class="login-input" style="height: 120px" placeholder="Describe symptoms or report findings..."></textarea>
        
        <div id="upload-section" style="display:none">
            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <i class="fas fa-cloud-upload-alt fa-3x"></i>
                <p>Upload Medical Image or PDF</p>
                <input type="file" id="file-input" style="display:none" accept="image/*,application/pdf">
                <div id="file-name-display" style="margin-top:10px; font-size:0.85em; font-weight:700; color:var(--accent-color)"></div>
            </div>
            <div id="progress-container" style="width:100%; background:#e2e8f0; height:6px; border-radius:10px; overflow:hidden">
                <div id="upload-progress" class="progress-bar"></div>
            </div>
        </div>

        <div style="display:flex; justify-content: flex-end; gap: 15px; margin-top:25px">
            <button onclick="app.closeModal()" style="background:none; border:none; color:var(--secondary-text); cursor:pointer; font-weight:700">Cancel</button>
            <button id="save-btn" class="login-btn" style="width:auto; margin:0; padding: 12px 30px" onclick="app.saveEntry()">Save Record</button>
        </div>
    </div>
</div>

<script>
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/upload";
    const CLOUDINARY_PRESET = "u7OfWnYptjyT9VCLMcMLf0ZwMmU";

    const app = {
        currentUser: null,
        currentRole: 'patient',
        entries: [],
        currentMode: 'note',

        init() {
            const savedUser = localStorage.getItem('airaware_user');
            const savedRole = localStorage.getItem('airaware_role');
            if (savedUser && savedRole) {
                this.currentUser = savedUser;
                this.currentRole = savedRole;
                this.showApp();
            }
            
            document.getElementById('file-input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) document.getElementById('file-name-display').innerText = `Selected: ${file.name}`;
            });
        },

        setLoginRole(role) {
            this.currentRole = role;
            document.getElementById('btn-role-patient').classList.toggle('active', role === 'patient');
            document.getElementById('btn-role-staff').classList.toggle('active', role === 'staff');
        },

        login() {
            const user = document.getElementById('login-user').value.trim();
            if (user.length < 2) return alert("Enter a valid name");
            this.currentUser = user;
            localStorage.setItem('airaware_user', user);
            localStorage.setItem('airaware_role', this.currentRole);
            this.showApp();
        },

        logout() {
            localStorage.removeItem('airaware_user');
            localStorage.removeItem('airaware_role');
            location.reload();
        },

        showApp() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('current-patient-name').innerText = this.currentUser;
            document.getElementById('current-role-badge').innerText = this.currentRole;
            
            if(this.currentRole === 'staff') {
                document.getElementById('view-title').innerText = "All Patient Records";
                document.getElementById('bottom-bar').style.display = 'none'; // Staff typically review, not add
            }

            this.loadEntries();
        },

        openModal(mode) {
            this.currentMode = mode;
            document.getElementById('post-modal-overlay').style.display = 'flex';
            document.getElementById('upload-section').style.display = (mode === 'report') ? 'block' : 'none';
            document.getElementById('modal-title').innerText = (mode === 'report') ? 'Upload Health Report' : 'Daily Health Note';
        },

        closeModal() {
            document.getElementById('post-modal-overlay').style.display = 'none';
            document.getElementById('post-text').value = '';
            document.getElementById('file-input').value = '';
            document.getElementById('file-name-display').innerText = '';
        },

        async saveEntry() {
            const text = document.getElementById('post-text').value;
            const fileInput = document.getElementById('file-input');
            const saveBtn = document.getElementById('save-btn');
            let fileData = { url: null, type: 'none' };

            if (this.currentMode === 'report' && fileInput.files[0]) {
                saveBtn.disabled = true;
                saveBtn.innerText = "Processing...";
                try {
                    fileData = await this.uploadFile(fileInput.files[0]);
                } catch (err) {
                    alert("Upload failed. Check Cloudinary Config.");
                    saveBtn.disabled = false;
                    saveBtn.innerText = "Save Record";
                    return;
                }
            }

            const newEntry = {
                id: Date.now(),
                patient: this.currentUser,
                date: new Date().toLocaleString(),
                text: text,
                fileUrl: fileData.url,
                fileType: fileData.type
            };

            this.entries.unshift(newEntry);
            localStorage.setItem('airaware_records', JSON.stringify(this.entries));
            this.renderEntries();
            this.closeModal();
            saveBtn.disabled = false;
            saveBtn.innerText = "Save Record";
        },

        async uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_PRESET);

            document.getElementById('upload-progress').style.display = 'block';
            document.getElementById('upload-progress').style.width = '50%';

            const response = await fetch(CLOUDINARY_URL, {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            document.getElementById('upload-progress').style.width = '100%';
            
            return {
                url: data.secure_url,
                type: file.type.includes('pdf') ? 'pdf' : 'image'
            };
        },

        loadEntries() {
            const data = localStorage.getItem('airaware_records');
            this.entries = data ? JSON.parse(data) : [];
            this.renderEntries();
        },

        deleteEntry(id) {
            if (confirm("Permanently delete this medical record?")) {
                this.entries = this.entries.filter(e => e.id !== id);
                localStorage.setItem('airaware_records', JSON.stringify(this.entries));
                this.renderEntries();
            }
        },

        renderEntries() {
            const list = document.getElementById('records-list');
            list.innerHTML = '';

            // LOGIC CHANGE: Staff see all, Patients see self
            const filtered = (this.currentRole === 'staff') 
                ? this.entries 
                : this.entries.filter(e => e.patient === this.currentUser);

            if (filtered.length === 0) {
                list.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:50px; font-weight:700">No medical records found.</p>';
                return;
            }

            filtered.forEach(entry => {
                const card = document.createElement('div');
                card.className = 'post';
                
                let mediaHtml = '';
                if (entry.fileType === 'image') {
                    mediaHtml = `<div class="media-container"><img src="${entry.fileUrl}"></div>`;
                } else if (entry.fileType === 'pdf') {
                    mediaHtml = `
                        <a href="${entry.fileUrl}" target="_blank" class="pdf-link">
                            <i class="fas fa-file-pdf"></i>
                            <div>
                                <strong>Medical_Report.pdf</strong><br>
                                <small>Click to view clinical document</small>
                            </div>
                        </a>`;
                }

                // Show patient name if staff is viewing
                const patientNameTag = (this.currentRole === 'staff') ? `<span class="patient-label">Patient: ${entry.patient}</span>` : '';

                card.innerHTML = `
                    <button class="delete-btn" onclick="app.deleteEntry(${entry.id})"><i class="fas fa-trash"></i></button>
                    ${patientNameTag}
                    <div class="post-date">${entry.date}</div>
                    <div class="post-content">${entry.text.replace(/\n/g, '<br>')}</div>
                    ${mediaHtml}
                `;
                list.appendChild(card);
            });
        }
    };

    app.init();
</script>

</body>
</html>
